name: Android (test build)

# Spouštěný RUČNĚ (Actions → "Android (test build)" → Run workflow).
# Postaví Android APK (Chaquopy + WebView nad reálnou FastAPI appkou) a
# publikuje ho jako prerelease "android-latest" s přímým odkazem ke stažení:
#   https://github.com/ScoopEMPRetro/Eve-retroindustry/releases/download/android-latest/EveRetroindustry.apk
#
# Záměrně NEnapojeno na release.yml — dokud je Android jen testovací (runtime na
# zařízení neověřen, OAuth login zatím nejde), nepatří do verzovaných releasů.

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # potřeba pro publikaci release assetu
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Prepare shared Python + assets
        working-directory: android-poc
        run: bash prepare.sh

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.p12"

      - name: Build signed release APK
        working-directory: android-poc
        # První build je pomalý — Chaquopy stahuje CPython 3.12 + wheely.
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: cp android-poc/app/build/outputs/apk/release/app-release.apk EveRetroindustry.apk

      - name: Generate version.json (pro in-app updater)
        run: |
          VC=$(grep -oP 'versionCode \K[0-9]+' android-poc/app/build.gradle | head -1)
          VN=$(grep -oP 'versionName "\K[^"]+' android-poc/app/build.gradle | head -1)
          cat > version.json <<EOF
          {"versionCode": $VC, "versionName": "$VN", "apkUrl": "https://github.com/ScoopEMPRetro/Eve-retroindustry/releases/download/android-latest/EveRetroindustry.apk"}
          EOF
          echo "version.json:"; cat version.json

      - name: Publish to 'android-latest' prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Vytvoř prerelease (poprvé) nebo jen nahraj/přepiš assety (dále).
          gh release create android-latest EveRetroindustry.apk version.json \
            --prerelease \
            --title "EVE Retroindustry — Android (test build)" \
            --notes "Automatický testovací Android build (arm64, sideload). Stáhni EveRetroindustry.apk a nainstaluj ručně (povol instalaci z neznámých zdrojů). Aktualizace pak jdou přímo v appce." \
            --target main \
          || gh release upload android-latest EveRetroindustry.apk version.json --clobber

      - name: Upload APK artifact (záloha)
        uses: actions/upload-artifact@v4
        with:
          name: EveRetroindustry-apk
          path: EveRetroindustry.apk
