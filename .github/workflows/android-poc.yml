name: Android PoC (Chaquopy dependency check)

# Samostatný workflow, spouštěný RUČNĚ (Actions → "Android PoC" → Run workflow).
# Cíl: ověřit, že Chaquopy umí pro arm64 sehnat všechny wheely aplikace —
# hlavně pydantic-core (Rust). Build APK = test stacku. Výsledek APK se
# nahraje jako artifact; nainstaluješ na telefon a appka vypíše report.
#
# Záměrně NEnapojeno na release.yml — dokud je to PoC, nepatří do veřejného
# releasu. Po ověření (pydantic_core OK) se reálná appka integruje do release.yml.

on:
  workflow_dispatch:

jobs:
  build-android-poc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Prepare shared Python + assets
        working-directory: android-poc
        run: bash prepare.sh

      - name: Build APK
        working-directory: android-poc
        # První build je pomalý — Chaquopy stahuje CPython 3.12 + wheely.
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android-poc/app/build/outputs/apk/debug/app-debug.apk EveRetroindustry.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EveRetroindustry-apk
          path: EveRetroindustry.apk
