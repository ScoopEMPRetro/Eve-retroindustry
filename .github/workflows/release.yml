name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller eve_retroindustry.spec --noconfirm

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/EVE_Retroindustry -DestinationPath EVE_Retroindustry-${{ github.ref_name }}-win64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: win64
          path: EVE_Retroindustry-${{ github.ref_name }}-win64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller eve_retroindustry.spec --noconfirm

      - name: Create ZIP
        run: cd dist && zip -r ../EVE_Retroindustry-${{ github.ref_name }}-linux.zip EVE_Retroindustry

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: EVE_Retroindustry-${{ github.ref_name }}-linux.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "EVE Retroindustry ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.zip \
            sde_base.db \
          || gh release upload ${{ github.ref_name }} \
            artifacts/*.zip \
            sde_base.db \
            --clobber
