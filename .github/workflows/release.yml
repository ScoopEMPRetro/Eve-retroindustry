name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller eve_retroindustry.spec --noconfirm

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/EVE_Retroindustry -DestinationPath EVE_Retroindustry-${{ github.ref_name }}-win64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: win64
          path: EVE_Retroindustry-${{ github.ref_name }}-win64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system Qt runtime deps (so PyInstaller can bundle them)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libdbus-1-3 libnss3 libxdamage1 \
            libxcomposite1 libxrandr2 libxtst6 libasound2t64 libfontconfig1

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller eve_retroindustry.spec --noconfirm

      - name: Create ZIP
        run: cd dist && zip -r ../EVE_Retroindustry-${{ github.ref_name }}-linux.zip EVE_Retroindustry

      - name: Build AppImage
        run: |
          # ── AppDir structure ─────────────────────────────────────────────
          mkdir -p AppDir
          cp -r dist/EVE_Retroindustry/. AppDir/

          # AppRun — entry point called by the AppImage runtime
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "${APPDIR}/EVE_Retroindustry" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Desktop file (required by AppImage spec)
          cat > AppDir/eve-retroindustry.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=EVE Retroindustry
          Comment=EVE Online industry calculator
          Exec=EVE_Retroindustry
          Icon=eve-retroindustry
          Type=Application
          Categories=Game;Utility;
          DESKTOP

          # Icon — convert bundled .ico to 256×256 PNG
          python3 -c "
          from PIL import Image
          img = Image.open('assets/icon.ico')
          # Pick the largest available frame
          sizes = img.info.get('sizes', set())
          target = max(sizes, key=lambda s: s[0]) if sizes else (64, 64)
          img = img.resize((256, 256), Image.LANCZOS)
          img.convert('RGBA').save('AppDir/eve-retroindustry.png')
          "

          # ── appimagetool + FUSE3-compatible runtime ───────────────────────
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool

          # Use the type2-runtime which supports both FUSE2 and FUSE3.
          # Arch-based distros (Garuda, Manjaro) ship fuse3 but not fuse2 by
          # default — the standard AppImageKit runtime only loads libfuse.so.2
          # and fails there.
          wget -q "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64" \
               -O runtime-x86_64 \
          || wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-x86_64" \
               -O runtime-x86_64
          chmod +x runtime-x86_64

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool --no-appstream \
               --runtime-file runtime-x86_64 \
               AppDir "EVE_Retroindustry-${{ github.ref_name }}-linux.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            EVE_Retroindustry-${{ github.ref_name }}-linux.zip
            EVE_Retroindustry-${{ github.ref_name }}-linux.AppImage

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Prepare shared Python + assets
        working-directory: android-poc
        run: bash prepare.sh

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.p12"

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          VN="${TAG#v}"
          IFS='.' read -r MA MI PA <<< "$VN"
          VC=$(( ${MA:-0}*10000 + ${MI:-0}*100 + ${PA:-0} ))
          echo "name=$VN" >> "$GITHUB_OUTPUT"
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "Android version $VN ($VC)"

      - name: Build signed release APK
        working-directory: android-poc
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ steps.ver.outputs.code }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Stage APK + version.json (stabilní jména pro releases/latest/download)
        run: |
          cp android-poc/app/build/outputs/apk/release/app-release.apk EveRetroindustry.apk
          cat > version.json <<EOF
          {"versionCode": ${{ steps.ver.outputs.code }}, "versionName": "${{ steps.ver.outputs.name }}", "apkUrl": "https://github.com/ScoopEMPRetro/Eve-retroindustry/releases/latest/download/EveRetroindustry.apk"}
          EOF
          cat version.json

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            EveRetroindustry.apk
            version.json

  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "EVE Retroindustry ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.zip \
            artifacts/*.AppImage \
            artifacts/EveRetroindustry.apk \
            artifacts/version.json \
            sde_base.db \
          || gh release upload ${{ github.ref_name }} \
            artifacts/*.zip \
            artifacts/*.AppImage \
            artifacts/EveRetroindustry.apk \
            artifacts/version.json \
            sde_base.db \
            --clobber
